<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex, nofollow">
<title>LUXE Protection Films — Investor Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --bg:#0A0806; --bg2:#100C08; --panel:rgba(255,255,255,.035); --panel2:rgba(255,255,255,.055);
  --brd:rgba(216,180,95,.16); --brd2:rgba(255,255,255,.08);
  --ink:#F6F0E4; --ink2:#CDC5B4; --soft:#9A917F; --muted:#6C6456;
  --gold:#D8B45F; --gold-hi:#F3D890; --gold-deep:#B8892F;
  --green:#34D399; --blue:#6C9BF7; --teal:#2DD4CE; --orange:#F59E5B; --plum:#C08AE0; --rose:#F3708A;
  --line:rgba(255,255,255,.08);
  --disp:'Barlow Condensed',sans-serif; --mono:'Space Mono',monospace; --body:'Inter',system-ui,sans-serif;
  --wrap:1120px;
}
body{background:var(--bg); color:var(--ink2); font-family:var(--body); line-height:1.65; overflow-x:hidden; -webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{width:100%;max-width:var(--wrap);margin:0 auto;padding:0 26px}
/* fixed ambient background */
.bgfx{position:fixed; inset:0; z-index:-2; pointer-events:none; overflow:hidden}
.bgfx .blob{position:absolute; border-radius:50%; filter:blur(90px); opacity:.5; will-change:transform}
.bgfx .b1{width:46vw;height:46vw;left:-10vw;top:-8vw;background:radial-gradient(circle,rgba(216,180,95,.30),transparent 68%);animation:fl1 30s ease-in-out infinite}
.bgfx .b2{width:42vw;height:42vw;right:-10vw;top:24vh;background:radial-gradient(circle,rgba(52,211,153,.16),transparent 68%);animation:fl2 38s ease-in-out infinite}
.bgfx .b3{width:40vw;height:40vw;left:14vw;top:120vh;background:radial-gradient(circle,rgba(45,212,206,.16),transparent 68%);animation:fl3 34s ease-in-out infinite}
.bgfx .b4{width:44vw;height:44vw;right:-8vw;top:210vh;background:radial-gradient(circle,rgba(192,138,224,.15),transparent 68%);animation:fl1 42s ease-in-out infinite}
.bgfx .b5{width:40vw;height:40vw;left:-6vw;top:300vh;background:radial-gradient(circle,rgba(216,180,95,.20),transparent 68%);animation:fl2 36s ease-in-out infinite}
.grid-overlay{position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.5;
  background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);
  background-size:58px 58px; mask-image:radial-gradient(120% 90% at 50% 0%,#000,transparent 85%); -webkit-mask-image:radial-gradient(120% 90% at 50% 0%,#000,transparent 85%)}
@keyframes fl1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(6vw,5vw) scale(1.12)}}
@keyframes fl2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-6vw,6vw) scale(1.1)}}
@keyframes fl3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(5vw,-5vw) scale(1.14)}}
/* progress bar */
.pbar{position:fixed;top:0;left:0;height:2px;width:0;z-index:60;background:linear-gradient(90deg,var(--gold-hi),var(--teal),var(--plum));box-shadow:0 0 10px rgba(216,180,95,.6)}
/* nav */
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(10,8,6,.6);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:70px}
.brand{display:flex;align-items:center;gap:12px}
.brand img{height:44px;filter:drop-shadow(0 0 12px rgba(216,180,95,.5))}
.bn{font-family:var(--disp);font-weight:700;font-size:25px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);line-height:.9}
.bs{font-family:var(--mono);font-size:8.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--body);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:13px 22px;border-radius:3px;cursor:pointer;border:1px solid transparent;transition:.25s}
.btn-gold{color:#1A1206;background:linear-gradient(135deg,var(--gold-hi),var(--gold));box-shadow:0 0 22px rgba(216,180,95,.35),inset 0 1px 0 rgba(255,255,255,.4)}
.btn-gold:hover{box-shadow:0 0 34px rgba(216,180,95,.6),inset 0 1px 0 rgba(255,255,255,.5);transform:translateY(-2px)}
.btn-ghost{color:var(--gold-hi);border-color:var(--brd);background:rgba(216,180,95,.04)}
.btn-ghost:hover{border-color:var(--gold);background:rgba(216,180,95,.1);transform:translateY(-2px);box-shadow:0 0 22px rgba(216,180,95,.22)}
.nav .btn{padding:10px 18px}
/* section shell */
section{position:relative;z-index:1}
.sec{padding:clamp(64px,9vw,120px) 0}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);display:inline-flex;align-items:center;gap:9px}
.eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold)}
.eyebrow.g::before{background:var(--green);box-shadow:0 0 10px var(--green)}
.eyebrow.t::before{background:var(--teal);box-shadow:0 0 10px var(--teal)}
.eyebrow.b::before{background:var(--blue);box-shadow:0 0 10px var(--blue)}
h2{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.005em;color:var(--ink);font-size:clamp(34px,5.4vw,60px);line-height:.96;margin:14px 0}
.lead{font-size:clamp(15px,1.7vw,18px);color:var(--ink2);max-width:64ch;line-height:1.75}
.lead b{color:var(--ink);font-weight:600}
.reveal{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}
/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden}
.hero canvas{position:absolute;inset:0;z-index:0;opacity:.8;pointer-events:none}
.hero-in{position:relative;z-index:2;max-width:900px;padding-top:60px;padding-bottom:60px}
.hero .kick{font-family:var(--mono);font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:22px}
.hero h1{font-family:var(--disp);font-weight:700;text-transform:uppercase;color:var(--ink);font-size:clamp(64px,13vw,168px);line-height:.86;letter-spacing:.01em}
.hero h1 .glow{background:linear-gradient(120deg,var(--gold-hi),var(--gold) 40%,var(--gold-deep) 75%,var(--gold-hi));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 26px rgba(216,180,95,.45))}
.hero .sub{font-size:clamp(16px,2vw,21px);color:var(--ink2);max-width:60ch;margin:30px 0 36px;line-height:1.7}
.hero .sub b{color:var(--gold-hi);font-weight:600}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap}
.hero .btn{padding:16px 28px;font-size:14px}
.scrolltip{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:2;font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--soft);display:flex;flex-direction:column;align-items:center;gap:8px}
.scrolltip span{width:1px;height:30px;background:linear-gradient(var(--gold),transparent);animation:sd 1.8s ease-in-out infinite}
@keyframes sd{0%,100%{opacity:.3;transform:scaleY(.5)}50%{opacity:1;transform:scaleY(1)}}
/* glass card */
.glass{background:var(--panel);border:1px solid var(--brd2);border-radius:16px;backdrop-filter:blur(8px);box-shadow:0 20px 50px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05)}
/* statement */
.state{font-family:var(--disp);font-weight:600;text-transform:uppercase;font-size:clamp(28px,4.4vw,52px);line-height:1.02;color:var(--ink);max-width:20ch}
.state .hl{color:var(--gold-hi)}
.two{display:grid;grid-template-columns:1.1fr 1fr;gap:clamp(24px,4vw,60px);align-items:center}
@media(max-width:820px){.two{grid-template-columns:1fr;gap:26px}}
/* funnel */
.funnel{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:14px;align-items:stretch;margin-top:20px}
.fstep{padding:34px 20px;text-align:center;border-radius:16px}
.fstep .fn{font-family:var(--disp);font-weight:700;font-size:clamp(52px,8vw,86px);line-height:.9;color:var(--gold-hi);text-shadow:0 0 30px rgba(216,180,95,.4)}
.fstep.g .fn{color:var(--green);text-shadow:0 0 30px rgba(52,211,153,.4)}
.fstep.b .fn{color:var(--blue);text-shadow:0 0 30px rgba(108,155,247,.4)}
.fstep .fl{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-top:12px}
.farr{display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:26px}
@media(max-width:760px){.funnel{grid-template-columns:1fr}.farr{transform:rotate(90deg)}}
.fnote{font-size:14px;color:var(--soft);margin-top:22px;max-width:70ch;line-height:1.7}
.trowwrap{margin-top:30px;display:grid;gap:1px;background:var(--line);border-radius:12px;overflow:hidden}
.trow{display:grid;grid-template-columns:230px 1fr;gap:20px;padding:20px 22px;background:var(--bg)}
.trow .tk{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--gold-hi);font-size:17px}
.trow .tv{font-size:14.5px;color:var(--ink2)}
@media(max-width:640px){.trow{grid-template-columns:1fr;gap:5px}}
/* products bento */
.bento{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:26px}
@media(max-width:880px){.bento{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.bento{grid-template-columns:1fr}}
.pcard{position:relative;overflow:hidden;border-radius:16px;background:var(--panel);border:1px solid var(--brd2);transition:transform .3s,box-shadow .3s,border-color .3s}
.pcard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,var(--gold));z-index:3;box-shadow:0 0 14px var(--c,var(--gold))}
.pcard:hover{transform:translateY(-8px);border-color:var(--c,var(--gold));box-shadow:0 26px 60px rgba(0,0,0,.5),0 0 30px color-mix(in srgb,var(--c,var(--gold)) 30%,transparent)}
.pcard .pimg{aspect-ratio:16/11;overflow:hidden;background:#fff}
.pcard .pimg img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.pcard:hover .pimg img{transform:scale(1.06)}
.pcard .pbody{padding:20px 20px 24px}
.pcat{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--c,var(--gold))}
.pnm{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.02em;font-size:23px;color:var(--ink);margin:6px 0 8px}
.pds{font-size:13.5px;color:var(--soft);line-height:1.6}
/* data deck (markets) */
.deck{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:26px;perspective:1200px}
@media(max-width:820px){.deck{grid-template-columns:1fr}}
.dcard{position:relative;border-radius:16px;background:var(--panel);border:1px solid var(--brd2);padding:30px 26px;text-align:center;transform-style:preserve-3d;transition:transform .3s,box-shadow .3s,border-color .3s;overflow:hidden}
.dcard:hover{border-color:var(--c);box-shadow:0 26px 60px rgba(0,0,0,.5),0 0 40px color-mix(in srgb,var(--c) 26%,transparent)}
.dcard .dtag{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--c);margin-bottom:18px}
.dcard .dn{font-family:var(--disp);font-weight:700;font-size:clamp(50px,7vw,74px);line-height:.85;color:var(--c);text-shadow:0 0 30px color-mix(in srgb,var(--c) 45%,transparent)}
.dcard .dsub{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin-top:12px}
.dcard .drule{width:46px;height:3px;background:var(--c);border-radius:2px;margin:20px auto;box-shadow:0 0 12px var(--c)}
.dcard .dp{font-size:14px;color:var(--ink2);line-height:1.6}
.dglare{position:absolute;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity .3s;background:radial-gradient(circle at var(--gx,50%) var(--gy,50%),rgba(255,255,255,.14),transparent 45%)}
.src{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:24px;letter-spacing:.02em;line-height:1.6}
/* arch images */
.arch-grid{display:flex;gap:20px;flex-wrap:wrap;margin-top:30px}
.arch-grid figure{flex:1 1 300px;margin:0;border-radius:14px;overflow:hidden;border:1px solid var(--brd2);box-shadow:0 20px 50px rgba(0,0,0,.5)}
.arch-grid img{width:100%;height:clamp(280px,38vh,400px);object-fit:cover;display:block}
/* use of funds */
.uses{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:26px}
@media(max-width:720px){.uses{grid-template-columns:1fr}}
.use{padding:24px;border-radius:14px;background:var(--panel);border:1px solid var(--brd2);display:flex;gap:16px;transition:.3s}
.use:hover{border-color:var(--brd);transform:translateY(-3px)}
.use .ico{flex:0 0 46px;width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--gold-hi),var(--gold-deep));color:#1a1206;box-shadow:0 0 20px rgba(216,180,95,.35)}
.use h4{font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:18px;color:var(--ink);margin-bottom:5px}
.use p{font-size:13.5px;color:var(--soft);line-height:1.6}
.raisecard{margin-top:24px;padding:clamp(26px,4vw,44px);border-radius:18px;text-align:center;background:linear-gradient(160deg,rgba(216,180,95,.1),rgba(255,255,255,.02));border:1px solid var(--brd)}
.raisecard .rk{font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.raisecard h3{font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:clamp(26px,3.6vw,40px);color:var(--ink);margin:12px 0 10px}
.raisecard p{font-size:14.5px;color:var(--ink2);max-width:60ch;margin:0 auto 26px}
/* team */
.team{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:26px}
@media(max-width:760px){.team{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.team{grid-template-columns:1fr}}
.tm{padding:20px;border-radius:12px;background:var(--panel);border:1px solid var(--brd2);transition:.3s}
.tm:hover{border-color:var(--brd);transform:translateY(-3px)}
.tm .tn{font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:20px;color:var(--ink)}
.tm .tr{font-size:12.5px;color:var(--soft);margin-top:4px;line-height:1.5}
/* timeline */
.tl{margin-top:30px;padding-left:34px;position:relative}
.tl::before{content:"";position:absolute;left:8px;top:6px;bottom:10px;width:2px;background:linear-gradient(var(--gold),var(--teal),transparent);box-shadow:0 0 12px rgba(216,180,95,.4)}
.tli{position:relative;padding-bottom:28px}
.tli::before{content:"";position:absolute;left:-34px;top:2px;width:18px;height:18px;border-radius:50%;background:var(--bg);border:2px solid var(--gold);box-shadow:0 0 14px var(--gold)}
.tli h4{font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:19px;color:var(--ink);margin-bottom:4px}
.tli p{font-size:14px;color:var(--soft);max-width:60ch;line-height:1.6}
/* close */
.close{text-align:center;padding:clamp(64px,10vw,140px) 0}
.close h2{margin:0 auto 16px}
.close .lead{margin:0 auto 30px}
.cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
/* footer */
footer{border-top:1px solid var(--line);padding:40px 0 60px;margin-top:20px}
.foot-in{display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;align-items:flex-start}
.foot-brand{display:flex;gap:12px;align-items:center}
.foot-brand img{height:40px;filter:drop-shadow(0 0 10px rgba(216,180,95,.4))}
.foot-meta{font-size:12.5px;color:var(--soft);line-height:1.8}
.foot-meta a{color:var(--gold)}
.disc{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:24px;line-height:1.6;letter-spacing:.02em}
@media (prefers-reduced-motion:reduce){.bgfx .blob{animation:none}.scrolltip span{animation:none}.reveal{opacity:1;transform:none}}

/* ===== brief-specific (dark) ===== */
.gate{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:26px;
  background:radial-gradient(60% 50% at 80% 0%,rgba(216,180,95,.14),transparent 60%),radial-gradient(50% 40% at 0% 100%,rgba(45,212,206,.10),transparent 60%),var(--bg)}
.gate-card{width:100%;max-width:440px;text-align:center;padding:42px 34px;border-radius:20px;
  background:var(--panel);border:1px solid var(--brd);box-shadow:0 30px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(10px)}
.gate .emb{display:flex;justify-content:center;margin-bottom:22px}
.gate .emb img{height:76px;filter:drop-shadow(0 0 18px rgba(216,180,95,.6))}
.gate-eye{font-family:var(--mono);font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.gate-title{font-family:var(--disp);font-weight:700;text-transform:uppercase;color:var(--ink);font-size:38px;line-height:1;margin-bottom:14px}
.gate-msg{font-size:14px;color:var(--soft);margin-bottom:26px}
.fld{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--brd2);color:var(--ink);font-family:var(--body);font-size:15px;padding:14px 15px;border-radius:10px;margin-bottom:12px;outline:none;transition:.18s}
.fld::placeholder{color:#6f665a}
.fld:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(216,180,95,.16)}
.chk{display:flex;gap:10px;align-items:flex-start;text-align:left;font-size:12px;color:var(--soft);margin:4px 2px 20px;line-height:1.5;cursor:pointer}
.chk input{margin-top:2px;accent-color:var(--gold);width:15px;height:15px;flex:0 0 auto}
.gate .btn{width:100%;justify-content:center}
.gate-err{color:#F3708A;font-size:13px;min-height:18px;margin-bottom:12px;opacity:0;transition:.2s}
.gate-err.on{opacity:1}
.gate-alt{display:inline-block;margin-top:20px;font-size:13px;color:var(--gold-hi);border-bottom:1px solid var(--brd);padding-bottom:2px}
.gate-alt:hover{color:#fff;border-color:var(--gold)}
.gate-dis{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:22px;line-height:1.5}
#brief{opacity:0;transition:opacity .6s ease}
#brief.in{opacity:1}
.bhead{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:30px 0 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.bhead .brand img{height:50px;filter:drop-shadow(0 0 14px rgba(216,180,95,.55))}
.bhead-tag{font-family:var(--mono);font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
.bsec{padding:clamp(40px,6vw,68px) 0;border-top:1px solid var(--line)}
.bsec:first-of-type{border-top:none}
/* ASK with flash */
.ask{text-align:center;padding-top:clamp(34px,5vw,54px);position:relative}
.ask .eyebrow{justify-content:center;margin-bottom:16px}
.askwrap{position:relative;display:inline-block}
.ask-fig{font-family:var(--disp);font-weight:700;font-size:clamp(66px,13vw,132px);line-height:.9;display:inline-block;
  background:linear-gradient(100deg,var(--gold) 0%,var(--gold-hi) 43%,#FFFDF3 50%,var(--gold-hi) 57%,var(--gold) 100%);background-size:235% 100%;background-position:100% 0;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;filter:drop-shadow(0 0 26px rgba(216,180,95,.5))}
.ask-fig.flash{animation:askflash .95s cubic-bezier(.2,.8,.2,1), askshine 1.1s ease-out}
@keyframes askflash{0%{transform:scale(1)}24%{transform:scale(1.13);filter:drop-shadow(0 0 75px rgba(243,216,144,1)) drop-shadow(0 0 30px rgba(255,255,255,.8))}100%{transform:scale(1);filter:drop-shadow(0 0 26px rgba(216,180,95,.5))}}
@keyframes askshine{0%{background-position:155% 0}100%{background-position:-35% 0}}
.burst{position:absolute;left:50%;top:50%;width:130px;height:130px;transform:translate(-50%,-50%) scale(0);border-radius:50%;background:radial-gradient(circle,rgba(243,216,144,.65),rgba(243,216,144,.16) 40%,transparent 68%);opacity:0;pointer-events:none;z-index:-1}
.burst.go{animation:burst 1s ease-out}
@keyframes burst{0%{transform:translate(-50%,-50%) scale(0);opacity:1}55%{opacity:.55}100%{transform:translate(-50%,-50%) scale(12);opacity:0}}
.ring{position:absolute;left:50%;top:50%;width:120px;height:120px;transform:translate(-50%,-50%) scale(0);border-radius:50%;border:2px solid rgba(243,216,144,.7);opacity:0;pointer-events:none;z-index:-1}
.ring.go{animation:ringx 1s ease-out .05s}
@keyframes ringx{0%{transform:translate(-50%,-50%) scale(.2);opacity:.9}100%{transform:translate(-50%,-50%) scale(9);opacity:0}}
.ask-unit{display:block;font-family:var(--mono);font-size:14px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-top:12px}
.ask-sub{font-size:clamp(17px,2.2vw,22px);color:var(--ink2);margin-top:24px}
.ask-sub b{color:var(--gold-hi);font-weight:700}
.ask-note{font-size:13px;color:var(--muted);margin-top:16px;max-width:60ch;margin:16px auto 0;line-height:1.6}
.body-lg{font-size:clamp(15px,1.7vw,17.5px);color:var(--ink2);max-width:66ch;line-height:1.72}
.body-lg b{color:var(--ink);font-weight:600}
.lead-row{margin-bottom:20px}
.tlist{margin-top:26px;display:grid;gap:1px;background:var(--line);border-radius:12px;overflow:hidden}
.trow{display:grid;grid-template-columns:210px 1fr;gap:20px;padding:18px 20px;background:var(--bg)}
.trow .tk{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--gold-hi);font-size:16px}
.trow .tv{font-size:14px;color:var(--ink2)}
@media(max-width:640px){.trow{grid-template-columns:1fr;gap:5px}}
/* flip cards */
.flipwrap{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:760px){.flipwrap{grid-template-columns:1fr}}
.flip{perspective:1300px}
.flip-in{position:relative;width:100%;min-height:220px;transition:transform .7s cubic-bezier(.4,.15,.2,1);transform-style:preserve-3d}
.flip:hover .flip-in,.flip.flipped .flip-in{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:16px;padding:28px;display:flex;flex-direction:column;justify-content:center}
.flip-front{background:var(--panel);border:1px solid var(--brd2)}
.flip-front h3{font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:21px;color:var(--ink);margin-bottom:9px}
.flip-front p{font-size:14.5px;color:var(--ink2)}
.flip-back{background:linear-gradient(150deg,var(--gold-hi),var(--gold-deep));color:#1a1206;transform:rotateY(180deg);align-items:center;text-align:center;box-shadow:0 0 44px rgba(216,180,95,.4)}
.flip-back h4{font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:20px;color:#1a1206}
.ck{width:60px;height:60px;border:2px solid rgba(26,18,6,.8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:14px}
.fnote{font-size:13.5px;color:var(--soft);margin-top:18px;line-height:1.6;max-width:72ch}
/* use of funds bars */
.ufbars{display:flex;flex-direction:column;gap:22px;margin-top:8px}
.uflab{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.uflab span:first-child{font-family:var(--disp);font-weight:700;text-transform:uppercase;color:var(--ink);font-size:17px}
.ufpct{font-family:var(--disp);font-weight:700;color:var(--gold-hi);font-size:22px;text-shadow:0 0 16px rgba(216,180,95,.5)}
.ufd{font-size:13px;color:var(--soft);margin-top:8px}
.growbar{height:9px;background:rgba(255,255,255,.07);border-radius:6px;overflow:hidden}
.growbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold-hi),var(--gold-deep));box-shadow:0 0 14px rgba(216,180,95,.6);border-radius:6px;transition:width 1.2s cubic-bezier(.3,.8,.3,1)}
.bfoot{border-top:1px solid var(--line);padding:30px 0 46px;text-align:center}
.bfoot-dis{font-family:var(--mono);font-size:10.5px;color:var(--muted);max-width:70ch;margin:0 auto 10px;line-height:1.6}
.bfoot-brand{font-size:11px;color:var(--soft);letter-spacing:.04em}
.cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:28px}
</style></head>

  function decode(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return new TextDecoder("utf-8").decode(a);}
  function fmt(v,dec,pre,suf){var s=dec>0?v.toFixed(dec):Math.round(v).toLocaleString('en-US');return pre+s+suf;}
  function run(el,done){if(el.dataset.done)return;el.dataset.done='1';var to=parseFloat(el.dataset.val),dec=parseInt(el.dataset.dec||'0'),pre=el.dataset.prefix||'',suf=el.dataset.suffix||'',dur=1600,t0=null;
    if(rm){el.textContent=fmt(to,dec,pre,suf);if(done)done();return;}
    function step(ts){if(!t0)t0=ts;var pr=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-pr,3);el.textContent=fmt(to*e,dec,pre,suf);if(pr<1)requestAnimationFrame(step);else{el.textContent=fmt(to,dec,pre,suf);if(done)done();}}
    requestAnimationFrame(step);}
  function setupAnim(root){
    var ro=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');ro.unobserve(e.target);}});},{threshold:.12});
    // count-ups on scroll
    function inV(el){var r=el.getBoundingClientRect();return r.top<window.innerHeight*0.92&&r.bottom>0;}
    function cu(){root.querySelectorAll('.cu').forEach(function(el){if(!el.dataset.done&&inV(el)){ if(el.id==='askfig'){run(el,askFlash);} else run(el); }});}
    window.addEventListener('scroll',cu,{passive:true});cu();
    // uf bars
    function bars(){root.querySelectorAll('.growbar').forEach(function(bar){if(bar.dataset.done)return;if(!inV(bar))return;bar.dataset.done='1';var i=bar.querySelector('i');if(i){var w=i.dataset.w;if(rm)i.style.width=w;else requestAnimationFrame(function(){i.style.width=w;});}});}
    window.addEventListener('scroll',bars,{passive:true});bars();
    // flip tap + deck tilt
    root.querySelectorAll('.flip').forEach(function(f){f.addEventListener('click',function(){f.classList.toggle('flipped');});});
    if(!rm)root.querySelectorAll('.dcard').forEach(function(card){var g=document.createElement('div');g.className='dglare';card.appendChild(g);card.addEventListener('mousemove',function(ev){var r=card.getBoundingClientRect();var px=(ev.clientX-r.left)/r.width,py=(ev.clientY-r.top)/r.height;card.style.transform='perspective(1000px) rotateX('+((py-.5)*-7)+'deg) rotateY('+((px-.5)*7)+'deg) translateY(-6px)';g.style.setProperty('--gx',(px*100)+'%');g.style.setProperty('--gy',(py*100)+'%');g.style.opacity='1';});card.addEventListener('mouseleave',function(){card.style.transform='';g.style.opacity='0';});});
  }
  function askFlash(){var f=document.getElementById('askfig'),b=document.getElementById('burst');if(f){f.classList.add('flash');}if(b){b.classList.add('go');}var rg=document.getElementById('ring');if(rg){rg.classList.add('go');}}
  function logOpen(name){try{var fd=new FormData();fd.append("access_key",WEB3);fd.append("subject","Investor Brief opened - "+name);fd.append("name",name);fd.append("message",name+" opened the LUXE Investor Brief.");fd.append("botcheck","");fetch("https://api.web3forms.com/submit",{method:"POST",body:fd}).catch(function(){});}catch(e){}}
  document.getElementById("gateForm").addEventListener("submit",function(ev){
    ev.preventDefault();
    var name=document.getElementById("gName").value.trim(),pass=document.getElementById("gPass").value.trim(),agree=document.getElementById("gAgree").checked,err=document.getElementById("gErr");
    if(!name||!pass||!agree){err.textContent="Please complete every field.";err.classList.add("on");return;}
    if(pass.toLowerCase()!==PASS.toLowerCase()){err.textContent="Incorrect passcode.";err.classList.add("on");return;}
    var brief=document.getElementById("brief");
    brief.innerHTML=decode(PAYLOAD);brief.setAttribute("aria-hidden","false");
    document.getElementById("gate").style.display="none";window.scrollTo(0,0);
    requestAnimationFrame(function(){brief.classList.add("in");setupAnim(brief);});
    logOpen(name);
  });
